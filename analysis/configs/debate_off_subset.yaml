data:
  # Set to null when using local_test_dir (avoids HF rate-limiting during dev).
  hf_dataset: null
  train_split: train
  test_split: test
  cache_dir: data_cache
  local_train_path: null
  local_test_path: null
  local_test_dir: dataset/test-data
  local_train_dir: dataset/train-data
  tags_csv_path: dataset/education_dimensions_updated.csv

models:
  # Qwen3-8B: thinking mode, ~8B params, better capacity than Qwen2.5-7B
  generator_name: Qwen/Qwen3-8B
  embedding_name: intfloat/e5-base-v2
  device: auto
  load_in_4bit: true
  # Qwen3 native thinking mode — BTC requires thinking mode enabled
  enable_thinking: true
  # Cap thinking chain length (Qwen3 native). None = unlimited (very slow).
  # 512 tokens ≈ 4-5 reasoning sentences — sufficient for classification.
  thinking_budget: 256   # reduced from 512 for 2x speedup per call
  # Chunk large batches to avoid OOM when max_new_tokens is large.
  batch_chunk_size: 16

task1:
  mode: heuristic       # heuristic gets 0.924 acc, LLM only gets 0.72
  type_mode: heuristic
  tag_mode: llm
  language: en
  k_tag_candidates: 40  # wider retrieval pool for better recall (was 20)
  tag_conf_threshold: 0.33
  max_tags_per_para: 5
  max_tags_per_dimension: 2

task2:
  mode: llm             # heuristic | llm | debate — LLM mode avoids bad heuristics
  language: en
  k_candidates: 6       # balanced: more than 5 but faster than 8
  window: 1             # ±1 for speed; k=6 provides cross-doc coverage
  max_edges_per_para: 5
  rel_conf_threshold: 0.40  # slightly lower threshold (was 0.50)

# JSON repair: retry loop when LLM output cannot be parsed
json_repair:
  max_retries: 3        # max re-prompt attempts before raising error

# Debate: cross-lingual deliberative alignment (Phase 1)
debate:
  enabled: false
  apply_to_relations: false        # set true to activate CDA framework
  rounds: 2             # deliberation rounds before referee
  agents:
    - name: agent_fr
      language: fr
    - name: agent_en
      language: en

# RAG: retrieve similar training paragraphs for in-context examples
rag:
  enabled: true         # RAG index built from 49479 train paragraphs
  index_path: outputs/rag_index.faiss
  meta_path: outputs/rag_meta.json
  top_k: 3

evaluation:
  use_gemini: false
  gemini_model_env: GEMINI_MODEL
  per_doc_sample: 8

output:
  out_dir: outputs
  submission_name: submission.json
  judge_report_name: judge_report.md

logging:
  enabled: true
  trace_jsonl_name: trace_events.jsonl
  trace_summary_name: trace_summary.json
  repair_stats_name: repair_stats.json
